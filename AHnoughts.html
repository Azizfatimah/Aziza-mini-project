<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noughts and Crosses</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("https://cdna.artstation.com/p/assets/images/images/004/346/882/large/elena-konstantinova-stormwars-flying-island-main-map-level-close-up.jpg?1482768105");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
      z-index: -1;
    }

    .game {
      background: rgba(249, 200, 200, 0.85);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    #status {
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .signature {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
      font-style: italic;
    }

    .signature::before {
      content: "✨ ";
    }

    .signature::after {
      content: " ✨";
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .cell {
      width: 96px;
      height: 96px;
      font-size: 32px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #e9ecef;
      cursor: pointer;
    }

    .cell:hover:not(:disabled) {
      background: #dfe3e6;
    }

    .cell:disabled {
      cursor: default;
      color: #222;
    }

    .confetti {
      position: fixed;
      top: -10px;
      font-size: 24px;
      animation: fall linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    #resetBtn {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #222;
      color: white;
    }

    #resetBtn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Noughts and Crosses</h1>
    <p class="signature">Made by Azizfatima</p>
    <div id="status">Player X's turn</div>
    <div class="board" id="board"></div>
    <button id="resetBtn">Restart Game</button>
  </div>

  <script>
    const boardElement = document.getElementById('board');
    const statusElement = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');

    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameRunning = true;

    const winPatterns = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function createBoard() {
      boardElement.innerHTML = '';

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('button');
        cell.classList.add('cell');
        cell.textContent = board[i];
        cell.addEventListener('click', () => makeMove(i));
        boardElement.appendChild(cell);
      }
    }

    function makeMove(index) {
      if (!gameRunning || board[index] !== '') return;

      board[index] = currentPlayer;
      updateBoard();

      if (checkWinner()) {
        statusElement.textContent = `Player ${currentPlayer} wins!`;
        gameRunning = false;
        launchConfetti();
        return;
      }

      if (board.every(cell => cell !== '')) {
        statusElement.textContent = "It's a draw!";
        gameRunning = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusElement.textContent = `Player ${currentPlayer}'s turn`;
    }

    function launchConfetti() {
      const emojis = ['💖'];

      for (let i = 0; i < 40; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 4000);
      }
    }

    
    function updateBoard() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, index) => {
        cell.textContent = board[index];
        cell.disabled = board[index] !== '' || !gameRunning;
      });
    }

    function checkWinner() {
      return winPatterns.some(pattern => {
        const [a, b, c] = pattern;
        return board[a] && board[a] === board[b] && board[a] === board[c];
      });
    }

    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameRunning = true;
      statusElement.textContent = "Player X's turn";
      createBoard();
      updateBoard();
    }

    resetBtn.addEventListener('click', resetGame);

    createBoard();
    updateBoard();
  </script>
</body>
</html>
